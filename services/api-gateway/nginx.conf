# services/api-gateway/nginx.conf
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # CORS headers for API requests
        set $cors_origin "";
        if ($http_origin ~* "^http://localhost(:[0-9]+)?$") {
            set $cors_origin $http_origin;
        }

        # Add CORS headers to all responses
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        # Route core frontend requests
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js specific routes (HMR, static files)
        location /_next/ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Auth Service
        location /api/auth/ {
            proxy_pass http://identity-service:4001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Specific Mosque Sub-resources (Route to respective services)
        location ~ ^/api/mosques/[^/]+/announcements {
            proxy_pass http://community-service:4004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/api/mosques/[^/]+/events {
            proxy_pass http://prayer-event-service:4003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/api/mosques/[^/]+/books {
            proxy_pass http://library-service:4006;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/api/mosques/[^/]+/goals {
            proxy_pass http://finance-service:4007;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Mosque Service (Core data, imams, management)
        location /api/mosques/ {
            proxy_pass http://mosque-service:4002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Prayer & Event Service
        location /api/prayer-times/ {
            proxy_pass http://prayer-event-service:4003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/events/ {
            proxy_pass http://prayer-event-service:4003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Community Service
        location /api/community/ {
            proxy_pass http://community-service:4004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Governance Service
        location /api/shura/ {
            return 404;
        }

        # Library Service
        location /api/library/ {
            proxy_pass http://library-service:4006;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Finance Service
        location /api/finance/ {
            proxy_pass http://finance-service:4007;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        # Direct Entity Access
        location /api/imams/ {
            proxy_pass http://mosque-service:4002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/announcements/ {
            proxy_pass http://community-service:4004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/books/ {
            proxy_pass http://library-service:4006;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/goals/ {
            proxy_pass http://finance-service:4007;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/management/ {
            proxy_pass http://mosque-service:4002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
