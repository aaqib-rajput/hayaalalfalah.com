name: mosqueconnect-production

x-node-service: &node-service
  init: true
  restart: unless-stopped
  user: root
  networks:
    - mosque_network

services:
  api-gateway:
    image: ${IMAGE_PREFIX:-mosqueconnect-production}-api-gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-80}:80"
    volumes:
      - ./services/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      mosque-service:
        condition: service_healthy
      prayer-event-service:
        condition: service_healthy
      community-service:
        condition: service_healthy
      library-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - mosque_network

  frontend:
    image: ${IMAGE_PREFIX:-mosqueconnect-production}-frontend:${IMAGE_TAG:-latest}
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api-gateway:80/api}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      identity-service:
        condition: service_healthy
      mosque-service:
        condition: service_healthy
      prayer-event-service:
        condition: service_healthy
      community-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      library-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mosque_network

  identity-service:
    <<: *node-service
    image: ${IMAGE_PREFIX:-mosqueconnect-production}-identity-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://user:password@postgres:5432/identity_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-mc_access_token}
      AUTH_COOKIE_MAX_AGE_MS: ${AUTH_COOKIE_MAX_AGE_MS:-86400000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command:
      - sh
      - -lc
      - >-
        apk add --no-cache openssl libc6-compat &&
        printf "%s\n" "module.exports = require('./shared-utils/src/index.js')" > /app/packages/shared-utils/dist/index.js &&
        npx prisma generate --schema=services/identity-service/prisma/schema.prisma &&
        exec node scripts/run-service-with-migrations.mjs services/identity-service/prisma/schema.prisma services/identity-service/dist/services/identity-service/src/index.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4001/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  mosque-service:
    <<: *node-service
    image: ${IMAGE_PREFIX:-mosqueconnect-production}-mosque-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 4002
      DATABASE_URL: postgresql://user:password@postgres:5432/mosque_db?schema=public
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command:
      - sh
      - -lc
      - >-
        apk add --no-cache openssl libc6-compat &&
        printf "%s\n" "module.exports = require('./shared-utils/src/index.js')" > /app/packages/shared-utils/dist/index.js &&
        npx prisma generate --schema=services/mosque-service/prisma/schema.prisma &&
        exec node scripts/run-service-with-migrations.mjs services/mosque-service/prisma/schema.prisma services/mosque-service/dist/services/mosque-service/src/index.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4002/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  prayer-event-service:
    <<: *node-service
    image: ${IMAGE_PREFIX:-mosqueconnect-production}-prayer-event-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 4003
      DATABASE_URL: postgresql://user:password@postgres:5432/prayer_db?schema=public
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command:
      - sh
      - -lc
      - >-
        apk add --no-cache openssl libc6-compat &&
        printf "%s\n" "module.exports = require('./shared-utils/src/index.js')" > /app/packages/shared-utils/dist/index.js &&
        npx prisma generate --schema=services/prayer-event-service/prisma/schema.prisma &&
        exec node scripts/run-service-with-migrations.mjs services/prayer-event-service/prisma/schema.prisma services/prayer-event-service/dist/services/prayer-event-service/src/index.js
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4003/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  community-service:
    <<: *node-service
    image: ${IMAGE_PREFIX:-mosqueconnect-production}-community-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 4004
      DATABASE_URL: postgresql://user:password@postgres:5432/community_db?schema=public
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command:
      - sh
      - -lc
      - >-
        apk add --no-cache openssl libc6-compat &&
        printf "%s\n" "module.exports = require('./shared-utils/src/index.js')" > /app/packages/shared-utils/dist/index.js &&
        npx prisma generate --schema=services/community-service/prisma/schema.prisma &&
        exec node scripts/run-service-with-migrations.mjs services/community-service/prisma/schema.prisma services/community-service/dist/services/community-service/src/index.js
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4004/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  governance-service:
    <<: *node-service
    image: ${IMAGE_PREFIX:-mosqueconnect-production}-governance-service:${IMAGE_TAG:-latest}
    profiles:
      - full
    environment:
      NODE_ENV: production
      PORT: 4005
      DATABASE_URL: postgresql://user:password@postgres:5432/governance_db?schema=public
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command:
      - sh
      - -lc
      - >-
        apk add --no-cache openssl libc6-compat &&
        printf "%s\n" "module.exports = require('./shared-utils/src/index.js')" > /app/packages/shared-utils/dist/index.js &&
        npx prisma generate --schema=services/governance-service/prisma/schema.prisma &&
        exec node scripts/run-service-with-migrations.mjs services/governance-service/prisma/schema.prisma services/governance-service/dist/services/governance-service/src/index.js
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4005/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  library-service:
    <<: *node-service
    image: ${IMAGE_PREFIX:-mosqueconnect-production}-library-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 4006
      DATABASE_URL: postgresql://user:password@postgres:5432/library_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-mc_access_token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command:
      - sh
      - -lc
      - >-
        apk add --no-cache openssl libc6-compat &&
        printf "%s\n" "module.exports = require('./shared-utils/src/index.js')" > /app/packages/shared-utils/dist/index.js &&
        npx prisma generate --schema=services/library-service/prisma/schema.prisma &&
        exec node scripts/run-service-with-migrations.mjs services/library-service/prisma/schema.prisma services/library-service/dist/services/library-service/src/index.js
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4006/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  finance-service:
    <<: *node-service
    image: ${IMAGE_PREFIX:-mosqueconnect-production}-finance-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 4007
      DATABASE_URL: postgresql://user:password@postgres:5432/finance_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-mc_access_token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command:
      - sh
      - -lc
      - >-
        apk add --no-cache openssl libc6-compat &&
        printf "%s\n" "module.exports = require('./shared-utils/src/index.js')" > /app/packages/shared-utils/dist/index.js &&
        npx prisma generate --schema=services/finance-service/prisma/schema.prisma &&
        exec node scripts/run-service-with-migrations.mjs services/finance-service/prisma/schema.prisma services/finance-service/dist/services/finance-service/src/index.js
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4007/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  notification-service:
    <<: *node-service
    image: ${IMAGE_PREFIX:-mosqueconnect-production}-notification-service:${IMAGE_TAG:-latest}
    profiles:
      - full
    environment:
      NODE_ENV: production
      PORT: 4008
      DATABASE_URL: postgresql://user:password@postgres:5432/notification_db?schema=public
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command:
      - sh
      - -lc
      - >-
        apk add --no-cache openssl libc6-compat &&
        printf "%s\n" "module.exports = require('./shared-utils/src/index.js')" > /app/packages/shared-utils/dist/index.js &&
        npx prisma generate --schema=services/notification-service/prisma/schema.prisma &&
        exec node scripts/run-service-with-migrations.mjs services/notification-service/prisma/schema.prisma services/notification-service/dist/services/notification-service/src/index.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4008/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES:-identity_db,mosque_db,prayer_db,community_db,governance_db,library_db,finance_db,notification_db}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - mosque_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - mosque_network

volumes:
  postgres_data:
  redis_data:

networks:
  mosque_network:
    driver: bridge
